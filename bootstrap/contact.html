                        <div class="collapse navbar-collapse" id="myMenu">
                            <ul class="navbar-nav">
                                <li class="nav-item">
                                    <a href="home.html" class="nav-link active">Home</a>
                                </li>
                                <li class="nav-item">
                                    <a href="#" class="nav-link">About</a>
                                </li>
                                <li class="nav-item dropdown">
                                    <a class="nav-link dropdown-toggle"  id="navbarDropdown" data-bs-toggle="dropdown" href="#">Dropdown Menu</a>

            <div class="container-fluid bg-light">
                <h1 class="text-center pt-5 pb-5">Contact Us</h1>

        </header>
        <div class="container">
                <div class="row">
                    <div class="col-6">
                        <h2 class="text-center text-primary">Send Message</h2>
                        <form name="cont-frm" class="mb-3">
                            <div class="mb-3">
                                <label class="form-label">Name</label>
                                <input type="text" name="fullname" class="form-control border-primary">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" name="email_id" class="form-control border-primary">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contact Number</label>
                                <input type="number" name="mobile" class="form-control border-primary">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Message</label>
                                <textarea name="msg" rows="7" class="form-control border-primary"></textarea>
                            </div>
                            <input type="submit" name="ok" value="Send Message" class="btn btn-primary">
                        </form>
                    </div>
                    <div class="col-6">
                        
                    </div>
                </div>
        </div>
        <footer class="container-fluid bg-dark">
